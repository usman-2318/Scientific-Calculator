<html>

<head>

<title>Calculator</title>

<link rel="stylesheet" href="calculator.css">

</head>

<body>



<!-- ================================================= -->
<!-- =============== ACTIVITY 1 ====================== -->
<!-- ========== BASIC CALCULATOR ===================== -->
<!-- ================================================= -->

<div class="calculator" id="basicScreen">

    <!-- DISPLAY -->

    <div class="display">

        <input type="text"
               id="display"
               placeholder="">

    </div>



    <!-- ROW 1 -->

    <div class="row">

        <button class="btn">AC</button>

        <button class="btn">DEL</button>

        <button class="btn">%</button>

        <button class="btn operator">/</button>

    </div>



    <!-- ROW 2 -->

    <div class="row">

        <button class="btn">7</button>

        <button class="btn">8</button>

        <button class="btn">9</button>

        <button class="btn operator">*</button>

    </div>



    <!-- ROW 3 -->

    <div class="row">

        <button class="btn">4</button>

        <button class="btn">5</button>

        <button class="btn">6</button>

        <button class="btn operator">-</button>

    </div>



    <!-- ROW 4 -->

    <div class="row">

        <button class="btn">1</button>

        <button class="btn">2</button>

        <button class="btn">3</button>

        <button class="btn operator">+</button>

    </div>



    <!-- ROW 5 -->

    <div class="row">

        <button class="btn zero">0</button>

        <button class="btn">.</button>

        <button class="btn operator">=</button>

    </div>



    <!-- OPEN SCIENTIFIC -->

    <button id="openScientific">

        Scientific →

    </button>

</div>





<!-- ================================================= -->
<!-- =============== ACTIVITY 2 ====================== -->
<!-- ========= SCIENTIFIC CALCULATOR ================ -->
<!-- ================================================= -->

<div class="scientific-screen" id="scientificScreen">

    <!-- DISPLAY -->

    <div class="scientific-display">

        <input type="text"
               id="scientificDisplay"
               placeholder="Scientific Calculator">

    </div>



    <div class="scientific-layout">



        <!-- SCIENTIFIC FUNCTIONS -->

        <div class="scientific-functions">



            <!-- TOP BUTTONS -->

            <div class="sci-row">

                <button id="backToBasic">

                    Back ⬅

                </button>



                <button id="openInverse">

                    Inverse →

                </button>

            </div>



            <!-- FUNCTIONS -->

            <div class="sci-row">

                <button class="btn">sin</button>

                <button class="btn">cos</button>

                <button class="btn">tan</button>

                <button class="btn">ln</button>

            </div>



            <div class="sci-row">

                <button class="btn">log</button>

                <button class="btn">π</button>

                <button class="btn">e</button>

                <button class="btn">√</button>

            </div>



            <div class="sci-row">

                <button class="btn">^</button>

                <button class="btn">(</button>

                <button class="btn">)</button>

                <button class="btn">!</button>

            </div>



            <div class="sci-row">

                <button class="btn">RAD</button>

                <button class="btn">DEG</button>

                <button class="btn">ANS</button>

                <button class="btn">EXP</button>

            </div>

        </div>





        <!-- NORMAL CALCULATOR -->

        <div class="normal-buttons">



            <div class="row">

                <button class="btn">AC</button>

                <button class="btn">DEL</button>

                <button class="btn">%</button>

                <button class="btn operator">/</button>

            </div>



            <div class="row">

                <button class="btn">7</button>

                <button class="btn">8</button>

                <button class="btn">9</button>

                <button class="btn operator">*</button>

            </div>



            <div class="row">

                <button class="btn">4</button>

                <button class="btn">5</button>

                <button class="btn">6</button>

                <button class="btn operator">-</button>

            </div>



            <div class="row">

                <button class="btn">1</button>

                <button class="btn">2</button>

                <button class="btn">3</button>

                <button class="btn operator">+</button>

            </div>



            <div class="row">

                <button class="btn zero">0</button>

                <button class="btn">.</button>

                <button class="btn operator">=</button>

            </div>

        </div>

    </div>

</div>





<!-- ================================================= -->
<!-- =============== ACTIVITY 3 ====================== -->
<!-- =========== INVERSE CALCULATOR ================= -->
<!-- ================================================= -->

<div class="inverse-screen" id="inverseScreen">



    <!-- DISPLAY -->

    <div class="inverse-display">

        <input type="text"
               id="inverseDisplay"
               placeholder="Inverse Calculator">

    </div>



    <div class="inverse-layout">



        <!-- INVERSE FUNCTIONS -->

        <div class="inverse-functions">



            <!-- TOP BUTTONS -->

            <div class="sci-row">

                <button id="backToBasicFromInverse">

                    Basic ⬅

                </button>



                <button id="backToScientific">

                    Scientific ⬅

                </button>

            </div>



            <!-- INVERSE ROWS -->

            <div class="sci-row">

                <button class="btn">sin⁻¹</button>

                <button class="btn">cos⁻¹</button>

                <button class="btn">tan⁻¹</button>

            </div>



            <div class="sci-row">

                <button class="btn">eˣ</button>

                <button class="btn">10ˣ</button>

                <button class="btn">x²</button>

            </div>



            <div class="sci-row">

                <button class="btn">x³</button>

                <button class="btn">1/x</button>

                <button class="btn">x!</button>

            </div>



            <div class="sci-row">

                <button class="btn">sinh</button>

                <button class="btn">cosh</button>

                <button class="btn">tanh</button>

            </div>

        </div>





        <!-- NORMAL CALCULATOR -->

        <div class="inverse-normal">



            <div class="row">

                <button class="btn">AC</button>

                <button class="btn">DEL</button>

                <button class="btn">%</button>

                <button class="btn operator">/</button>

            </div>



            <div class="row">
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn operator">*</button>
            </div>



            <div class="row">
            <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn operator">-</button>
            </div>



            <div class="row">

                <button class="btn">1</button>

                <button class="btn">2</button>

                <button class="btn">3</button>

                <button class="btn operator">+</button>

            </div>



            <div class="row">

                <button class="btn zero">0</button>

                <button class="btn">.</button>

                <button class="btn operator">=</button>

            </div>

        </div>

    </div>

</div>



<script src="calculator.js"></script>

</body>

</html>
